name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NIX_CACHE_URL: ${{ vars.NIX_CACHE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        with:
          extra_nix_config: |
            experimental-features = nix-command
            extra-substituters = https://cache.iog.io ${{ vars.NIX_CACHE_URL }}
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= ${{ vars.NIX_CACHE_PUBLIC_KEY }}
      - name: Build
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        run: nix-build release.nix --no-out-link | tee "$RUNNER_TEMP/nix-build-paths"
      - name: Upload to S3 binary cache
        if: github.event_name == 'push' && env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          NIX_CACHE_PRIVATE_KEY: ${{ secrets.NIX_CACHE_PRIVATE_KEY }}
        run: |
          key_file="$RUNNER_TEMP/nix-cache-private-key"
          printf '%s\n' "$NIX_CACHE_PRIVATE_KEY" > "$key_file"
          chmod 600 "$key_file"
          paths=$(< "$RUNNER_TEMP/nix-build-paths")
          nix store sign --recursive --key-file "$key_file" $paths
          nix copy --to "$NIX_CACHE_URL" $paths
